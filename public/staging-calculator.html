<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staging Calculator — OOOSH Staff Hub</title>
  <link rel="stylesheet" href="/staging-calculator.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">

    <!-- Header -->
    <header class="page-header">
      <a href="/" class="back-link">← Staff Hub</a>
      <h1>🏗️ Staging Calculator</h1>
      <p class="subtitle">Enter desired stage dimensions to calculate deck, leg, and hardware requirements.</p>
    </header>

    <!-- Input Form -->
    <div class="card input-card">
      <form id="calc-form">
        <div class="form-row">
          <!-- Unit Toggle -->
          <div class="form-group unit-group">
            <label for="unit-toggle">Units</label>
            <select id="unit-toggle">
              <option value="m">Meters</option>
              <option value="ft">Feet</option>
            </select>
          </div>

          <!-- Length -->
          <div class="form-group">
            <label id="length-label" for="stage-length">Length (m)</label>
            <input type="number" id="stage-length" step="any" min="0.1" placeholder="Length" required>
          </div>

          <!-- Width -->
          <div class="form-group">
            <label id="width-label" for="stage-width">Width (m)</label>
            <input type="number" id="stage-width" step="any" min="0.1" placeholder="Width" required>
          </div>

          <!-- Height -->
          <div class="form-group">
            <label id="height-label" for="stage-height">Height (m)</label>
            <input type="number" id="stage-height" step="any" min="0.1" placeholder="Height" required>
          </div>
        </div>

        <div class="form-row">
          <!-- Combiner Mode -->
          <div class="form-group combiner-group">
            <label for="combiner-mode">Combiners</label>
            <select id="combiner-mode">
              <option value="all">Use everywhere (fewer legs)</option>
              <option value="interior-only">Interior junctions only</option>
              <option value="none">No combiners (separate legs)</option>
            </select>
          </div>

          <!-- Calculate Button -->
          <div class="form-group btn-group">
            <button type="submit" class="btn btn-calculate">Calculate</button>
          </div>
        </div>
      </form>
    </div>

    <!-- Results (populated by JS) -->
    <div id="results" class="results hidden"></div>

  </div>

  <script src="/staging-calculator.js"></script>
</body>
</html>
