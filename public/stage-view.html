<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stage Configuration — Ooosh Tours</title>

  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="icon" href="/favicon-192.png" type="image/png" sizes="192x192">

  <!-- Open Graph meta tags — makes shared links look nice in emails, WhatsApp, Slack etc -->
  <meta property="og:title" content="Stage Configuration — Ooosh Tours">
  <meta property="og:description" content="Interactive 3D stage layout preview. Rotate, zoom, and explore the proposed staging configuration.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://ooosh-utilities.netlify.app/favicon-192.png">
  <meta property="og:image:width" content="192">
  <meta property="og:image:height" content="192">
  <meta property="og:site_name" content="Ooosh Tours">

  <!-- Twitter card (used by many apps as fallback) -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Stage Configuration — Ooosh Tours">
  <meta name="twitter:description" content="Interactive 3D stage layout preview from Ooosh Tours.">
  <meta name="twitter:image" content="https://ooosh-utilities.netlify.app/favicon-192.png">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #0c0f14;
      color: #e8eaed;
      overflow: hidden;
      height: 100vh;
    }

    /* ── Top bar ── */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: linear-gradient(180deg, rgba(12,15,20,0.95) 0%, rgba(12,15,20,0) 100%);
      pointer-events: none;
    }
    .top-bar > * { pointer-events: auto; }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .brand-logo {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      object-fit: contain;
    }
    .brand-text {
      font-weight: 700;
      font-size: 16px;
      letter-spacing: -0.02em;
      color: #f1f5f9;
    }
    .brand-sub {
      font-size: 11px;
      color: #64748b;
      font-family: 'Space Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* ── Dimensions panel ── */
    .dims-panel {
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 100;
      background: rgba(15, 18, 25, 0.9);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 20px 24px;
      min-width: 220px;
    }
    .dims-title {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #64748b;
      margin-bottom: 14px;
    }
    .dim-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .dim-row:last-child { border-bottom: none; }
    .dim-name {
      font-size: 13px;
      color: #94a3b8;
      font-weight: 500;
    }
    .dim-val {
      font-family: 'Space Mono', monospace;
      font-size: 15px;
      font-weight: 700;
      color: #f1f5f9;
    }
    .dim-secondary-val {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: #475569;
      margin-left: 6px;
    }

    /* ── Controls hint ── */
    .controls-hint {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 100;
      font-size: 12px;
      color: #475569;
      text-align: right;
      line-height: 1.8;
    }
    .controls-hint kbd {
      display: inline-block;
      padding: 2px 6px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: #94a3b8;
    }

    /* ── Canvas ── */
    #stage-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    /* ── Loading state ── */
    .loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: #0c0f14;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      transition: opacity 0.5s;
    }
    .loading-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .loading-spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(99,102,241,0.2);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: #64748b;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── Error state ── */
    .error-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: #0c0f14;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px;
      text-align: center;
    }
    .error-overlay h2 {
      font-size: 20px;
      color: #f87171;
    }
    .error-overlay p {
      color: #64748b;
      font-size: 14px;
      max-width: 400px;
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .dims-panel { bottom: 12px; left: 12px; right: 12px; min-width: unset; }
      .controls-hint { display: none; }
      .top-bar { padding: 12px 16px; }
    }
  </style>
</head>
<body>

  <!-- Loading overlay -->
  <div class="loading-overlay" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">Building stage…</div>
  </div>

  <!-- Top bar -->
  <div class="top-bar">
    <div class="brand">
      <img src="/favicon-192.png" alt="Ooosh Tours" class="brand-logo">
      <div>
        <div class="brand-text">Ooosh Tours</div>
        <div class="brand-sub">Stage Configuration</div>
      </div>
    </div>
  </div>

  <!-- Dimensions panel (populated by JS) -->
  <div class="dims-panel" id="dims-panel" style="display:none">
    <div class="dims-title">Dimensions</div>
    <div id="dims-content"></div>
  </div>

  <!-- Controls hint -->
  <div class="controls-hint">
    <kbd>Drag</kbd> rotate<br>
    <kbd>Scroll</kbd> zoom<br>
    <kbd>Shift+Drag</kbd> pan
  </div>

  <!-- Three.js canvas -->
  <canvas id="stage-canvas"></canvas>

  <!-- Pako for URL decompression (tiny — ~13KB gzipped) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // ========================================================================
    // PARSE CONFIG FROM URL
    // Supports two formats:
    //   ?config={JSON}       — legacy (raw JSON, URL-encoded)
    //   ?c={base64url}       — new (pako-compressed + base64url-encoded)
    // ========================================================================

    function parseConfig() {
      const params = new URLSearchParams(window.location.search);

      // Try new compressed format first (?c=)
      const compressed = params.get('c');
      if (compressed) {
        try {
          // Base64url → standard base64 → binary → pako inflate → JSON
          const base64 = compressed.replace(/-/g, '+').replace(/_/g, '/');
          const binary = atob(base64);
          const bytes = new Uint8Array(binary.length);
          for (let i = 0; i < binary.length; i++) {
            bytes[i] = binary.charCodeAt(i);
          }
          const json = pako.inflate(bytes, { to: 'string' });
          return JSON.parse(json);
        } catch (e) {
          console.error('Failed to decompress config:', e);
          // Fall through to try legacy format
        }
      }

      // Legacy format (?config={JSON})
      const raw = params.get('config');
      if (raw) {
        try {
          return JSON.parse(decodeURIComponent(raw));
        } catch (e) {
          console.error('Failed to parse config:', e);
          return null;
        }
      }

      return null;
    }

    // ========================================================================
    // UNIT HELPERS
    // ========================================================================

    function inchesToMetricStr(inches) {
      const cm = inches * 2.54;
      if (cm >= 100) return (cm / 100).toFixed(2) + 'm';
      return Math.round(cm) + 'cm';
    }

    function inchesToFeetStr(inches) {
      let ft = Math.floor(inches / 12);
      let rem = Math.round(inches % 12);
      if (rem >= 12) { ft++; rem = 0; }
      if (rem === 0) return ft + "'";
      if (ft === 0) return rem + '"';
      return ft + "' " + rem + '"';
    }

    function formatDim(inches, unit) {
      const primary = unit === 'm' ? inchesToMetricStr(inches) : inchesToFeetStr(inches);
      const secondary = unit === 'm' ? inchesToFeetStr(inches) : inchesToMetricStr(inches);
      return { primary, secondary };
    }

    // ========================================================================
    // MAIN 3D SCENE
    // ========================================================================

    const config = parseConfig();

    if (!config) {
      document.getElementById('loading').innerHTML = `
        <div class="error-overlay">
          <h2>No stage data</h2>
          <p>This page needs to be opened from the Staging Calculator with a valid configuration.</p>
        </div>
      `;
    } else {
      buildScene(config);
    }

    function buildScene(cfg) {
      const canvas = document.getElementById('stage-canvas');

      // ── Renderer ──
      const renderer = new THREE.WebGLRenderer({
        canvas,
        antialias: true,
        alpha: false,
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.1;
      renderer.outputEncoding = THREE.sRGBEncoding;

      // ── Scene ──
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0c0f14);
      scene.fog = new THREE.FogExp2(0x0c0f14, 0.008);

      // ── Scale: 1 unit = 1 inch (we'll convert to a reasonable 3D scale) ──
      // Use a scale factor so the stage looks good in the viewport
      const SCALE = 1 / 12; // 1 foot = 1 unit in Three.js space
      const stageLength = cfg.l * SCALE;
      const stageWidth = cfg.w * SCALE;
      const stageHeight = cfg.h * SCALE;

      // ── Camera ──
      const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 500);
      const maxDim = Math.max(stageLength, stageWidth);
      const camDist = maxDim * 2.2;
      camera.position.set(camDist * 0.7, stageHeight + camDist * 0.5, camDist * 0.8);
      camera.lookAt(stageLength / 2, stageHeight / 2, stageWidth / 2);

      // ── Lights ──
      const ambientLight = new THREE.AmbientLight(0x8899bb, 0.4);
      scene.add(ambientLight);

      const mainLight = new THREE.DirectionalLight(0xffeedd, 1.2);
      mainLight.position.set(maxDim * 1.5, maxDim * 2, maxDim * 1.2);
      mainLight.castShadow = true;
      mainLight.shadow.mapSize.width = 2048;
      mainLight.shadow.mapSize.height = 2048;
      mainLight.shadow.camera.near = 0.5;
      mainLight.shadow.camera.far = maxDim * 6;
      const shadowSize = maxDim * 2;
      mainLight.shadow.camera.left = -shadowSize;
      mainLight.shadow.camera.right = shadowSize;
      mainLight.shadow.camera.top = shadowSize;
      mainLight.shadow.camera.bottom = -shadowSize;
      mainLight.shadow.bias = -0.0005;
      scene.add(mainLight);

      const fillLight = new THREE.DirectionalLight(0x4488cc, 0.3);
      fillLight.position.set(-maxDim, maxDim * 0.5, -maxDim * 0.5);
      scene.add(fillLight);

      const rimLight = new THREE.DirectionalLight(0xffffff, 0.15);
      rimLight.position.set(0, maxDim * 0.3, -maxDim * 1.5);
      scene.add(rimLight);

      // ── Ground plane ──
      const groundGeo = new THREE.PlaneGeometry(maxDim * 8, maxDim * 8);
      const groundMat = new THREE.MeshStandardMaterial({
        color: 0x151820,
        roughness: 0.95,
        metalness: 0.05,
      });
      const ground = new THREE.Mesh(groundGeo, groundMat);
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = -0.01;
      ground.receiveShadow = true;
      scene.add(ground);

      // Subtle grid
      const gridHelper = new THREE.GridHelper(maxDim * 6, maxDim * 6, 0x1a1f2a, 0x1a1f2a);
      gridHelper.position.y = 0;
      scene.add(gridHelper);

      // ── Materials ──
      // Deck surface — light plywood / birch appearance
      const deckTopMat = new THREE.MeshStandardMaterial({
        color: 0xc8a882,
        roughness: 0.7,
        metalness: 0.0,
      });

      // Deck sides — darker edge
      const deckSideMat = new THREE.MeshStandardMaterial({
        color: 0x8b7355,
        roughness: 0.8,
        metalness: 0.05,
      });

      // Deck underside — dark aluminium frame
      const deckFrameMat = new THREE.MeshStandardMaterial({
        color: 0x4a4a4a,
        roughness: 0.5,
        metalness: 0.6,
      });

      // Leg material — steel
      const legMat = new THREE.MeshStandardMaterial({
        color: 0x888888,
        roughness: 0.3,
        metalness: 0.8,
      });

      // Combiner material — darker steel
      const combinerMat = new THREE.MeshStandardMaterial({
        color: 0x555555,
        roughness: 0.4,
        metalness: 0.7,
      });

      // ── Build deck panels ──
      const DECK_THICKNESS = 0.5 * SCALE;   // ~0.5" deck thickness in model units
      const GAP = 0.3 * SCALE;               // slight gap between decks

      for (const [dx, dy, dl, dw] of cfg.d) {
        const x = dx * SCALE;
        const z = dy * SCALE;
        const deckL = dl * SCALE - GAP;
        const deckW = dw * SCALE - GAP;

        // Top surface
        const topGeo = new THREE.BoxGeometry(deckL, DECK_THICKNESS, deckW);

        // Create a multi-material box: top/bottom and sides
        const materials = [
          deckSideMat,   // +X
          deckSideMat,   // -X
          deckTopMat,    // +Y (top)
          deckFrameMat,  // -Y (bottom)
          deckSideMat,   // +Z
          deckSideMat,   // -Z
        ];

        const deckMesh = new THREE.Mesh(topGeo, materials);
        deckMesh.position.set(
          x + (deckL + GAP) / 2,
          stageHeight - DECK_THICKNESS / 2,
          z + (deckW + GAP) / 2
        );
        deckMesh.castShadow = true;
        deckMesh.receiveShadow = true;
        scene.add(deckMesh);

        // Aluminium frame bars under each deck (cross-members)
        const FRAME_H = 1.5 * SCALE;
        const FRAME_W = 0.8 * SCALE;
        const frameY = stageHeight - DECK_THICKNESS - FRAME_H / 2;

        // Two cross-members along length
        for (const offset of [0.25, 0.75]) {
          const barGeo = new THREE.BoxGeometry(deckL * 0.98, FRAME_H, FRAME_W);
          const barMesh = new THREE.Mesh(barGeo, deckFrameMat);
          barMesh.position.set(
            x + (deckL + GAP) / 2,
            frameY,
            z + (deckW + GAP) * offset
          );
          barMesh.castShadow = true;
          scene.add(barMesh);
        }
      }

      // ── Build legs ──
      const LEG_RADIUS = 0.6 * SCALE;
      const COMBINER_HEIGHT = 6 * SCALE;    // 6" combiner plate height
      const usesCombiners = cfg.cm !== 'none';

      for (const [jx, jy, jtype] of cfg.j) {
        const x = jx * SCALE;
        const z = jy * SCALE;
        const baseY = 0;
        const topY = stageHeight - DECK_THICKNESS;

        if (usesCombiners && jtype !== 'solo') {
          // Combiner plate
          const plateHeight = COMBINER_HEIGHT;
          const plateGeo = new THREE.BoxGeometry(
            jtype === 'interior' ? 3.5 * SCALE : 2.5 * SCALE,
            plateHeight,
            jtype === 'interior' ? 3.5 * SCALE : 2.5 * SCALE
          );
          const plateMesh = new THREE.Mesh(plateGeo, combinerMat);
          plateMesh.position.set(x, topY - plateHeight / 2, z);
          plateMesh.castShadow = true;
          scene.add(plateMesh);

          // Single leg below combiner
          const legH = topY - plateHeight - baseY;
          if (legH > 0) {
            const legGeo = new THREE.CylinderGeometry(LEG_RADIUS, LEG_RADIUS, legH, 12);
            const legMesh = new THREE.Mesh(legGeo, legMat);
            legMesh.position.set(x, baseY + legH / 2, z);
            legMesh.castShadow = true;
            scene.add(legMesh);

            // Base plate
            const basePlateGeo = new THREE.CylinderGeometry(LEG_RADIUS * 2, LEG_RADIUS * 2, 0.3 * SCALE, 12);
            const basePlateMesh = new THREE.Mesh(basePlateGeo, combinerMat);
            basePlateMesh.position.set(x, 0.15 * SCALE, z);
            basePlateMesh.castShadow = true;
            scene.add(basePlateMesh);
          }
        } else {
          // Solo corner — individual legs per deck
          const legH = topY - baseY;
          if (legH > 0) {
            const legGeo = new THREE.CylinderGeometry(LEG_RADIUS, LEG_RADIUS, legH, 12);
            const legMesh = new THREE.Mesh(legGeo, legMat);
            legMesh.position.set(x, baseY + legH / 2, z);
            legMesh.castShadow = true;
            scene.add(legMesh);

            // Base plate
            const basePlateGeo = new THREE.CylinderGeometry(LEG_RADIUS * 2, LEG_RADIUS * 2, 0.3 * SCALE, 12);
            const basePlateMesh = new THREE.Mesh(basePlateGeo, combinerMat);
            basePlateMesh.position.set(x, 0.15 * SCALE, z);
            basePlateMesh.castShadow = true;
            scene.add(basePlateMesh);
          }
        }
      }

      // ── Orbit controls (manual implementation — r128 doesn't bundle OrbitControls) ──
      let isDragging = false;
      let isShiftDrag = false;
      let prevMouse = { x: 0, y: 0 };
      let spherical = { theta: Math.PI * 0.25, phi: Math.PI * 0.35, radius: camDist };
      const target = new THREE.Vector3(stageLength / 2, stageHeight * 0.3, stageWidth / 2);

      function updateCamera() {
        const r = spherical.radius;
        const sinPhi = Math.sin(spherical.phi);
        const cosPhi = Math.cos(spherical.phi);
        const sinTheta = Math.sin(spherical.theta);
        const cosTheta = Math.cos(spherical.theta);

        camera.position.set(
          target.x + r * sinPhi * cosTheta,
          target.y + r * cosPhi,
          target.z + r * sinPhi * sinTheta
        );
        camera.lookAt(target);
      }
      updateCamera();

      canvas.addEventListener('mousedown', (e) => {
        isDragging = true;
        isShiftDrag = e.shiftKey;
        prevMouse = { x: e.clientX, y: e.clientY };
      });

      canvas.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const dx = e.clientX - prevMouse.x;
        const dy = e.clientY - prevMouse.y;
        prevMouse = { x: e.clientX, y: e.clientY };

        if (isShiftDrag) {
          // Pan
          const right = new THREE.Vector3();
          const up = new THREE.Vector3(0, 1, 0);
          camera.getWorldDirection(right);
          right.cross(up).normalize();
          const panSpeed = spherical.radius * 0.002;
          target.add(right.multiplyScalar(-dx * panSpeed));
          target.y += dy * panSpeed;
        } else {
          // Rotate
          spherical.theta -= dx * 0.005;
          spherical.phi = Math.max(0.1, Math.min(Math.PI * 0.49, spherical.phi - dy * 0.005));
        }
        updateCamera();
      });

      canvas.addEventListener('mouseup', () => { isDragging = false; });
      canvas.addEventListener('mouseleave', () => { isDragging = false; });

      canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        spherical.radius *= (1 + e.deltaY * 0.001);
        spherical.radius = Math.max(maxDim * 0.5, Math.min(maxDim * 8, spherical.radius));
        updateCamera();
      }, { passive: false });

      // Touch support
      let lastTouchDist = 0;
      canvas.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
          isDragging = true;
          isShiftDrag = false;
          prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        } else if (e.touches.length === 2) {
          lastTouchDist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
          );
        }
      });

      canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (e.touches.length === 1 && isDragging) {
          const dx = e.touches[0].clientX - prevMouse.x;
          const dy = e.touches[0].clientY - prevMouse.y;
          prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
          spherical.theta -= dx * 0.005;
          spherical.phi = Math.max(0.1, Math.min(Math.PI * 0.49, spherical.phi - dy * 0.005));
          updateCamera();
        } else if (e.touches.length === 2) {
          const dist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
          );
          spherical.radius *= lastTouchDist / dist;
          spherical.radius = Math.max(maxDim * 0.5, Math.min(maxDim * 8, spherical.radius));
          lastTouchDist = dist;
          updateCamera();
        }
      }, { passive: false });

      canvas.addEventListener('touchend', () => { isDragging = false; });

      // ── Resize ──
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      // ── Populate dimensions panel ──
      const unit = cfg.u || 'm';
      const l = formatDim(cfg.l, unit);
      const w = formatDim(cfg.w, unit);
      const h = formatDim(cfg.h, unit);
      const areaSqFt = (cfg.l * cfg.w) / 144;
      const areaSqM = (cfg.l * cfg.w) / 1550.0031;
      const areaStr = unit === 'm'
        ? `${areaSqM.toFixed(1)} sq m`
        : `${areaSqFt.toFixed(1)} sq ft`;

      document.getElementById('dims-content').innerHTML = `
        <div class="dim-row">
          <span class="dim-name">Length</span>
          <span><span class="dim-val">${l.primary}</span><span class="dim-secondary-val">${l.secondary}</span></span>
        </div>
        <div class="dim-row">
          <span class="dim-name">Width</span>
          <span><span class="dim-val">${w.primary}</span><span class="dim-secondary-val">${w.secondary}</span></span>
        </div>
        <div class="dim-row">
          <span class="dim-name">Height</span>
          <span><span class="dim-val">${h.primary}</span><span class="dim-secondary-val">${h.secondary}</span></span>
        </div>
        <div class="dim-row">
          <span class="dim-name">Area</span>
          <span class="dim-val">${areaStr}</span>
        </div>
        <div class="dim-row">
          <span class="dim-name">Decks</span>
          <span class="dim-val">${cfg.d.length}</span>
        </div>
      `;
      document.getElementById('dims-panel').style.display = '';

      // ── Animate ──
      function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
      }

      // Remove loading overlay and start rendering
      const loadingEl = document.getElementById('loading');
      setTimeout(() => {
        loadingEl.classList.add('fade-out');
        setTimeout(() => loadingEl.remove(), 600);
      }, 400);

      animate();
    }
  </script>
</body>
</html>
